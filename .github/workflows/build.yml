name: Build

on:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove legacy death scanner
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY' 2>&1 | tee patch.log
          from pathlib import Path
          import json

          path = Path('src/main/java/com/adaptor/deadrecall/Deadrecall.java')
          lines = path.read_text(encoding='utf-8').splitlines(keepends=True)

          remove_fields = {
              'private static final double DEATH_BACKPACK_COLLECTION_RADIUS = 10.0D;',
              'private static final String TAG_DEATH_BACKPACK_ID = "deadrecall_death_backpack_id";',
              'private static final Map<UUID, PendingDeathCollection> pendingDeathCollections = new HashMap<>();',
              'private static final Set<UUID> scheduledDeathBackpackCollections = new HashSet<>();',
          }
          found_fields = {line.strip() for line in lines if line.strip() in remove_fields}
          if found_fields != remove_fields:
              raise SystemExit(f'Legacy fields mismatch: found={found_fields!r}')
          lines = [line for line in lines if line.strip() not in remove_fields]

          register_line = 'ServerLivingEntityEvents.ALLOW_DEATH.register((entity, damageSource, damageAmount) -> {'
          register_indexes = [i for i, line in enumerate(lines) if line.strip() == register_line]
          if len(register_indexes) != 1:
              raise SystemExit(f'Expected one ALLOW_DEATH registration, found {len(register_indexes)}')
          index = register_indexes[0]
          expected = [
              register_line,
              'if (entity instanceof ServerPlayer player) {',
              'rememberExistingDropsBeforeDeath(player);',
              '} else if (entity instanceof net.minecraft.world.entity.animal.golem.CopperGolem golem) {',
              'CopperGolemWrenchHandler.clearGatheringDisplayedItem(golem);',
              '}',
              'return true;',
              '});',
          ]
          actual = [line.strip() for line in lines[index:index + len(expected)]]
          if actual != expected:
              raise SystemExit(f'Unexpected ALLOW_DEATH block: {actual!r}')
          replacement = [
              '        ServerLivingEntityEvents.ALLOW_DEATH.register((entity, damageSource, damageAmount) -> {\n',
              '            if (entity instanceof net.minecraft.world.entity.animal.golem.CopperGolem golem) {\n',
              '                CopperGolemWrenchHandler.clearGatheringDisplayedItem(golem);\n',
              '            }\n',
              '            return true;\n',
              '        });\n',
          ]
          lines[index:index + len(expected)] = replacement

          death_calls = [i for i, line in enumerate(lines) if line.strip() == 'handlePlayerDeath(player);']
          if len(death_calls) != 1:
              raise SystemExit(f'Expected one handlePlayerDeath call, found {len(death_calls)}')
          del lines[death_calls[0]]

          text = ''.join(lines)
          method_start_marker = '\n    private void handlePlayerDeath(ServerPlayer player) {'
          method_end_marker = '\n    private static boolean isFirstJoin'
          start = text.find(method_start_marker)
          end = text.find(method_end_marker, start + 1)
          if start < 0 or end < 0:
              raise SystemExit('Legacy death collector method section was not found')
          text = text[:start] + text[end:]

          record_start_marker = '\n    private record PendingDeathCollection('
          record_end_marker = '\n    private void replaceVanillaBookshelfInInventory'
          start = text.find(record_start_marker)
          end = text.find(record_end_marker, start + 1)
          if start < 0 or end < 0:
              raise SystemExit('PendingDeathCollection record section was not found')
          text = text[:start] + text[end:]

          import_candidates = {
              'import com.adaptor.deadrecall.item.BackpackItemHelper;\n': 'BackpackItemHelper',
              'import net.minecraft.core.component.DataComponents;\n': 'DataComponents',
              'import net.minecraft.nbt.CompoundTag;\n': 'CompoundTag',
              'import net.minecraft.world.entity.item.ItemEntity;\n': 'ItemEntity',
              'import net.minecraft.world.item.component.CustomData;\n': 'CustomData',
              'import net.minecraft.world.item.component.ItemContainerContents;\n': 'ItemContainerContents',
              'import net.minecraft.world.phys.AABB;\n': 'AABB',
              'import java.util.HashSet;\n': 'HashSet',
              'import java.util.Set;\n': 'Set<',
          }
          for import_line, token in import_candidates.items():
              without_import = text.replace(import_line, '')
              if import_line in text and token not in without_import:
                  text = without_import

          forbidden = [
              'DEATH_BACKPACK_COLLECTION_RADIUS',
              'TAG_DEATH_BACKPACK_ID',
              'pendingDeathCollections',
              'scheduledDeathBackpackCollections',
              'PendingDeathCollection',
              'rememberExistingDropsBeforeDeath',
              'handlePlayerDeath(',
              'markDeathBackpackUnique',
          ]
          remaining = [token for token in forbidden if token in text]
          if remaining:
              raise SystemExit(f'Legacy tokens remain: {remaining!r}')
          path.write_text(text, encoding='utf-8')

          mixin_path = Path('src/main/java/com/adaptor/deadrecall/mixin/DeadrecallDeathBackpackMixin.java')
          if not mixin_path.exists():
              raise SystemExit('DeadrecallDeathBackpackMixin.java was not found')
          mixin_path.unlink()

          config_path = Path('src/main/resources/deadrecall.mixins.json')
          config = json.loads(config_path.read_text(encoding='utf-8'))
          if config['mixins'].count('DeadrecallDeathBackpackMixin') != 1:
              raise SystemExit('DeadrecallDeathBackpackMixin config entry mismatch')
          config['mixins'].remove('DeadrecallDeathBackpackMixin')
          config_path.write_text(json.dumps(config, indent=2) + '\n', encoding='utf-8')
          print('Legacy death collector cleanup prepared successfully')
          PY

          git checkout origin/master -- .github/workflows/build.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "refactor: remove legacy death item scanner"
          git push origin HEAD:${{ github.head_ref }}

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and run server GameTests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew build --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Store failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-gametest-reports
          if-no-files-found: ignore
          path: |
            patch.log
            build.log
            **/build/reports/
            **/build/test-results/
            run/gametest/
