name: Build

on:
  push:
    branches:
      - master
      - fix/**
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Dedicated server smoke test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p run
          echo 'eula=true' > run/eula.txt
          (
            sleep 90
            echo stop
          ) | timeout 180s ./gradlew runServer --no-daemon --stacktrace 2>&1 | tee server-smoke.log
          grep -E 'Done \([^)]*\)! For help, type "help"|Done \([^)]*\)!' server-smoke.log

      - name: Upload server smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-smoke-log
          path: server-smoke.log
