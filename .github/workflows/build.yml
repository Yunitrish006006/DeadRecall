name: Build

on:
  push:
    branches:
      - master
      - fix/**
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: agent/friend-teleport-cancel-reasons
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Apply exact player target patch
        if: github.actor != 'github-actions[bot]'
        run: python3 scripts/agent_apply_player_target_reasons.py

      - name: Verify patch
        if: github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          grep -q 'SpaceUnitType targetType' src/main/java/com/adaptor/deadrecall/space/SpaceUnitHandler.java
          grep -q 'target_offline' src/main/resources/assets/deadrecall/lang/en_us.json
          grep -q 'target_unavailable' src/main/resources/assets/deadrecall/lang/zh_tw.json
          grep -q 'target_friendship' src/main/resources/assets/deadrecall/lang/zh_cn.json
          git diff --check

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Commit exact patch
        if: github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/main/java/com/adaptor/deadrecall/space/SpaceUnitHandler.java \
                  src/main/resources/assets/deadrecall/lang/en_us.json \
                  src/main/resources/assets/deadrecall/lang/zh_tw.json \
                  src/main/resources/assets/deadrecall/lang/zh_cn.json
          git commit -m 'fix: report precise player target cancellation reasons'
          git push origin HEAD:agent/friend-teleport-cancel-reasons
