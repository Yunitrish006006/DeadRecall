name: Build

on:
  push:
    branches:
      - master
      - fix/**
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and run server GameTests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew build --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Verify death backpack across Dedicated Server restarts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf restart-probe run/gametest/restart-probe
          for phase in seed recover verify; do
            echo "Running restart probe phase: ${phase}"
            DEADRECALL_RESTART_PROBE_PHASE="${phase}" \
              ./gradlew runGameTest --no-daemon --stacktrace \
              2>&1 | tee "restart-${phase}.log"

            marker=""
            for candidate in \
              "restart-probe/${phase}.ok" \
              "run/gametest/restart-probe/${phase}.ok"; do
              if [[ -f "${candidate}" ]]; then
                marker="${candidate}"
                break
              fi
            done
            if [[ -z "${marker}" ]]; then
              echo "Restart probe did not write a success marker for ${phase}" >&2
              find . -maxdepth 4 -type f -path '*restart-probe*' -print >&2 || true
              exit 1
            fi
            test ! -f "restart-probe/${phase}.failure"
            test ! -f "run/gametest/restart-probe/${phase}.failure"
          done

      - name: Store failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-gametest-reports
          if-no-files-found: ignore
          path: |
            build.log
            restart-*.log
            restart-probe/
            **/build/reports/
            **/build/test-results/
            run/gametest/
