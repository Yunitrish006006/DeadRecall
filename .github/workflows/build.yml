name: Build

on:
  push:
    branches:
      - master
      - fix/**
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        id: gradle-build
        shell: bash
        run: |
          set +e
          ./gradlew build --no-daemon --stacktrace --console=plain > gradle-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 180 gradle-build.log
            exit "$status"
          fi
          tail -n 40 gradle-build.log

      - name: Upload Gradle failure log
        if: failure() && steps.gradle-build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: error
