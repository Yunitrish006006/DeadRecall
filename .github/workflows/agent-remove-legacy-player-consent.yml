name: Remove legacy player consent

on:
  push:
    branches:
      - agent/remove-legacy-player-consent

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-legacy-player-consent
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply exact source cleanup
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          handler_path = Path('src/main/java/com/adaptor/deadrecall/space/SpaceUnitHandler.java')
          text = handler_path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              text = text.replace(old, new, 1)

          replace_once(
              '    private static final int PLAYER_TARGET_CONSENT_TICKS = 20 * 30;\n',
              '',
              'consent timeout constant'
          )
          replace_once(
              '    private static final Map<PlayerTeleportConsentKey, PendingPlayerTeleportConsent> pendingPlayerTeleportConsents = new HashMap<>();\n',
              '',
              'consent map'
          )

          replace_once(
              '''    public static void startTeleport(ServerPlayer player, String sourceType, UUID sourceUnitId, UUID targetUnitId) {
                  startTeleport(player, sourceType, sourceUnitId, targetUnitId, false);
              }

              private static void startTeleport(
                      ServerPlayer player,
                      String sourceType,
                      UUID sourceUnitId,
                      UUID targetUnitId,
                      boolean playerTargetConsentGranted) {
          ''',
              '''    public static void startTeleport(
                      ServerPlayer player,
                      String sourceType,
                      UUID sourceUnitId,
                      UUID targetUnitId) {
          ''',
              'startTeleport overloads'
          )

          replace_once(
              '''        if (target.get().requiresConsent() && !playerTargetConsentGranted) {
                      requestPlayerTeleportConsent(player, source.get(), target.get());
                      return;
                  }

          ''',
              '',
              'consent gate'
          )

          replace_once(
              '''        if (acceptPendingPlayerTeleport(player, target)) {
                      return InteractionResult.SUCCESS;
                  }

          ''',
              '',
              'compass consent acceptance'
          )

          consent_methods = re.compile(
              r'    private static void requestPlayerTeleportConsent\(ServerPlayer requester, MapSource source, TeleportTarget target\) \{.*?\n'
              r'    private static InteractionResult handleLodestoneUse',
              re.DOTALL
          )
          text, count = consent_methods.subn(
              '    private static InteractionResult handleLodestoneUse',
              text,
              count=1
          )
          if count != 1:
              raise SystemExit(f'consent methods: expected one block, found {count}')

          replace_once(
              '''        pendingPlayerTeleportConsents.remove(new PlayerTeleportConsentKey(playerId, friendId));
                  pendingPlayerTeleportConsents.remove(new PlayerTeleportConsentKey(friendId, playerId));

          ''',
              '',
              'relationship consent cleanup'
          )
          replace_once(
              '        pendingPlayerTeleportConsents.entrySet().removeIf(entry -> entry.getValue().isExpired(gameTime));\n',
              '',
              'consent expiry cleanup'
          )

          replace_once(
              '''            double wear,
                      boolean lodestoneAnchor,
                      boolean requiresConsent) {
          ''',
              '''            double wear,
                      boolean lodestoneAnchor) {
          ''',
              'TeleportTarget consent field'
          )
          replace_once(
              '''                    unit.structure().wear(),
                              unit.isLodestoneAnchor(),
                              false
          ''',
              '''                    unit.structure().wear(),
                              unit.isLodestoneAnchor()
          ''',
              'unit target constructor'
          )
          replace_once(
              '''                    0.0D,
                              false,
                              true
          ''',
              '''                    0.0D,
                              false
          ''',
              'player target constructor'
          )

          consent_records = re.compile(
              r'\n    private record PlayerTeleportConsentKey\(.*?\n'
              r'    private record TeleportSession\(',
              re.DOTALL
          )
          text, count = consent_records.subn(
              '\n    private record TeleportSession(',
              text,
              count=1
          )
          if count != 1:
              raise SystemExit(f'consent records: expected one block, found {count}')

          forbidden = [
              'PLAYER_TARGET_CONSENT_TICKS',
              'pendingPlayerTeleportConsents',
              'PlayerTeleportConsentKey',
              'PendingPlayerTeleportConsent',
              'requestPlayerTeleportConsent',
              'acceptPendingPlayerTeleport',
              'requiresConsent',
              'playerTargetConsentGranted',
          ]
          leftovers = [token for token in forbidden if token in text]
          if leftovers:
              raise SystemExit(f'legacy consent tokens remain: {leftovers}')

          handler_path.write_text(text, encoding='utf-8')

          mixin_path = Path('src/main/java/com/adaptor/deadrecall/mixin/SpaceUnitHandlerRefreshMixin.java')
          mixin_path.write_text('''package com.adaptor.deadrecall.mixin;

          import com.adaptor.deadrecall.space.DeadRecallFriendSavedData;
          import com.adaptor.deadrecall.space.DeadRecallSpaceUnitSavedData;
          import com.adaptor.deadrecall.space.FriendTeleportSessionPolicy;
          import com.adaptor.deadrecall.space.SpaceUnitHandler;
          import com.adaptor.deadrecall.space.SpaceUnitStructureRefresh;
          import net.minecraft.network.chat.Component;
          import net.minecraft.server.MinecraftServer;
          import net.minecraft.server.level.ServerPlayer;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.gen.Accessor;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          import java.util.Iterator;
          import java.util.Map;
          import java.util.UUID;

          @Mixin(SpaceUnitHandler.class)
          public abstract class SpaceUnitHandlerRefreshMixin {
              @Accessor("teleportSessions")
              public static Map<UUID, Object> deadrecall$getTeleportSessions() {
                  throw new AssertionError();
              }

              @Inject(
                      method = "sendSpaceUnitMap(Lnet/minecraft/server/level/ServerPlayer;Ljava/util/UUID;)V",
                      at = @At("HEAD")
              )
              private static void deadrecall$refreshMapSource(
                      ServerPlayer player,
                      UUID sourceUnitId,
                      CallbackInfo ci
              ) {
                  SpaceUnitStructureRefresh.refresh(player.level().getServer(), sourceUnitId);
              }

              @Inject(
                      method = "startTeleport(Lnet/minecraft/server/level/ServerPlayer;Ljava/lang/String;Ljava/util/UUID;Ljava/util/UUID;)V",
                      at = @At("HEAD")
              )
              private static void deadrecall$refreshTeleportRoute(
                      ServerPlayer player,
                      String sourceType,
                      UUID sourceUnitId,
                      UUID targetUnitId,
                      CallbackInfo ci
              ) {
                  MinecraftServer server = player.level().getServer();
                  if (SpaceUnitHandler.SOURCE_TYPE_LODESTONE.equals(sourceType)) {
                      SpaceUnitStructureRefresh.refresh(server, sourceUnitId);
                  }
                  SpaceUnitStructureRefresh.refresh(server, targetUnitId);
              }

              @Inject(
                      method = "startTeleport(Lnet/minecraft/server/level/ServerPlayer;Ljava/lang/String;Ljava/util/UUID;Ljava/util/UUID;)V",
                      at = @At("RETURN")
              )
              private static void deadrecall$notifyFriendTeleportStarted(
                      ServerPlayer player,
                      String sourceType,
                      UUID sourceUnitId,
                      UUID targetUnitId,
                      CallbackInfo ci
              ) {
                  if (targetUnitId == null || targetUnitId.equals(player.getUUID())) {
                      return;
                  }

                  MinecraftServer server = player.level().getServer();
                  DeadRecallSpaceUnitSavedData unitData = server.overworld()
                          .getDataStorage()
                          .computeIfAbsent(DeadRecallSpaceUnitSavedData.TYPE);
                  if (unitData.get(targetUnitId).isPresent()) {
                      return;
                  }

                  ServerPlayer targetPlayer = server.getPlayerList().getPlayer(targetUnitId);
                  if (targetPlayer == null || !targetPlayer.isAlive() || targetPlayer.isRemoved()) {
                      return;
                  }

                  DeadRecallFriendSavedData friendData = server.overworld()
                          .getDataStorage()
                          .computeIfAbsent(DeadRecallFriendSavedData.TYPE);
                  if (!friendData.areFriends(player.getUUID(), targetUnitId)) {
                      return;
                  }

                  Object sessionValue = deadrecall$getTeleportSessions().get(player.getUUID());
                  if (!(sessionValue instanceof SpaceUnitTeleportSessionAccessor session)
                          || !targetUnitId.equals(session.deadrecall$getTargetUnitId())) {
                      return;
                  }

                  targetPlayer.sendSystemMessage(Component.empty()
                          .append(Component.translatable("message.deadrecall.space_unit.teleport_start"))
                          .append(Component.literal(": "))
                          .append(player.getDisplayName())
                          .append(Component.literal(" → "))
                          .append(targetPlayer.getDisplayName()));
              }

              @Inject(
                      method = "removeFriend",
                      at = @At("TAIL")
              )
              private static void deadrecall$cancelRemovedFriendTeleports(
                      ServerPlayer player,
                      UUID friendId,
                      CallbackInfo ci
              ) {
                  UUID playerId = player.getUUID();
                  MinecraftServer server = player.level().getServer();
                  Iterator<Map.Entry<UUID, Object>> iterator = deadrecall$getTeleportSessions().entrySet().iterator();
                  while (iterator.hasNext()) {
                      Map.Entry<UUID, Object> entry = iterator.next();
                      if (!(entry.getValue() instanceof SpaceUnitTeleportSessionAccessor session)) {
                          continue;
                      }
                      if (!FriendTeleportSessionPolicy.belongsToRelationship(
                              entry.getKey(),
                              session.deadrecall$getTargetUnitId(),
                              playerId,
                              friendId)) {
                          continue;
                      }

                      iterator.remove();
                      ServerPlayer requester = server.getPlayerList().getPlayer(entry.getKey());
                      if (requester != null) {
                          requester.sendSystemMessage(Component.translatable(
                                  "message.deadrecall.space_unit.teleport_cancelled.target"));
                      }
                  }
              }
          }
          '''.replace('\n          ', '\n').lstrip(), encoding='utf-8')
          PY

      - name: Verify source cleanup
        shell: bash
        run: |
          ! grep -R -n -E 'PLAYER_TARGET_CONSENT_TICKS|pendingPlayerTeleportConsents|PlayerTeleportConsentKey|PendingPlayerTeleportConsent|requestPlayerTeleportConsent|acceptPendingPlayerTeleport|requiresConsent|playerTargetConsentGranted' src/main/java
          git diff --check

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/main/java/com/adaptor/deadrecall/space/SpaceUnitHandler.java \
                  src/main/java/com/adaptor/deadrecall/mixin/SpaceUnitHandlerRefreshMixin.java
          git commit -m 'refactor: remove legacy player teleport consent'
          git push origin HEAD:agent/remove-legacy-player-consent
