name: Validate

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check modularization compatibility baseline
        run: bash .github/scripts/check-modularization-baseline.sh

      - name: Check feature dependency boundaries
        run: bash .github/scripts/check-feature-dependency-boundaries.sh

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and test
        shell: bash
        run: |
          # Keep a stuck GameTest shutdown diagnosable instead of consuming the entire job.
          timeout --signal=TERM --kill-after=30s 15m \
            ./gradlew build --no-daemon --stacktrace

      - name: Upload test and GameTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          if-no-files-found: ignore
          path: |
            build/reports/**
            build/test-results/**
            run/gametest/**
